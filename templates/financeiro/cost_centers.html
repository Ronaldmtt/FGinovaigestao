{% extends 'base.html' %}
{% block title %}Centros de Custo - Financeiro PJ{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-tags me-2 text-primary"></i>Centros de Custo</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newCostCenterModal">
        <i class="fas fa-plus me-2"></i>Novo Centro de Custo
    </button>
</div>

<div class="card bg-dark text-white">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Identificação</th>
                        <th>Cor/Ícone</th>
                        <th>Status</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody id="costCentersTable">
                    <tr>
                        <td colspan="4" class="text-center text-muted">Carregando categorias...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Novo Centro de Custo -->
<div class="modal fade" id="newCostCenterModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title">Novo Centro de Custo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formCostCenter">
                    <input type="hidden" id="ccId">
                    <div class="mb-3">
                        <label class="form-label">Nome da Categoria</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="ccNome" required
                            placeholder="Ex: Marketing Digital">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Cor Hexadecimal</label>
                            <input type="color" class="form-control form-control-color bg-dark border-secondary w-100"
                                id="ccCor" value="#6366f1" title="Escolha a cor do relatório">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Classes do Ícone (FontAwesome)</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="ccIcone"
                                placeholder="fas fa-bullhorn" value="fas fa-tags">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="saveCostCenter()">Salvar</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', loadCostCenters);

    function loadCostCenters() {
        fetch('/api/financeiro/cost-centers')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('costCentersTable');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum centro de custo cadastrado.</td></tr>';
                    return;
                }

                data.forEach(cc => {
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <i class="${cc.icone} me-2" style="color: ${cc.cor}"></i>
                                <strong>${cc.nome}</strong>
                            </td>
                            <td><span class="badge" style="background-color: ${cc.cor}">${cc.cor}</span></td>
                            <td><span class="badge bg-success">Ativo</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-info me-1" onclick="editCostCenter(${cc.id}, '${cc.nome}', '${cc.cor}', '${cc.icone}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteCostCenter(${cc.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function saveCostCenter() {
        const id = document.getElementById('ccId').value;
        const payload = {
            nome: document.getElementById('ccNome').value,
            cor: document.getElementById('ccCor').value,
            icone: document.getElementById('ccIcone').value
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/financeiro/cost-centers/${id}` : '/api/financeiro/cost-centers';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            if (res.success) {
                bootstrap.Modal.getInstance(document.getElementById('newCostCenterModal')).hide();
                loadCostCenters();
                document.getElementById('formCostCenter').reset();
                document.getElementById('ccId').value = '';
            } else {
                alert(res.message);
            }
        });
    }

    function editCostCenter(id, nome, cor, icone) {
        document.getElementById('ccId').value = id;
        document.getElementById('ccNome').value = nome;
        document.getElementById('ccCor').value = cor;
        document.getElementById('ccIcone').value = icone;
        new bootstrap.Modal(document.getElementById('newCostCenterModal')).show();
    }

    function deleteCostCenter(id) {
        if (confirm('Deseja inativar este Centro de Custo? Lançamentos antigos não serão apagados.')) {
            fetch(`/api/financeiro/cost-centers/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) loadCostCenters();
                });
        }
    }

    // Reset modal on close
    document.getElementById('newCostCenterModal').addEventListener('hidden.bs.modal', function () {
        document.getElementById('formCostCenter').reset();
        document.getElementById('ccId').value = '';
    });
</script>
{% endblock %}
