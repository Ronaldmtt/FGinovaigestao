{% extends 'base.html' %}
{% block title %}Centros de Custo - Financeiro PJ{% endblock %}

{% block content %}
<style>
    .fin-cc-shell { display: grid; gap: 1.25rem; }
    .fin-cc-hero,
    .fin-cc-table-card {
        border: 1px solid var(--fg-border) !important;
        border-radius: 20px !important;
        background: linear-gradient(180deg, rgba(23,29,37,.96), rgba(18,24,32,.92)) !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.03), var(--fg-shadow-card);
    }
    .fin-cc-hero { padding: 1.2rem 1.35rem; }
    .fin-cc-shell .modal-content {
        background: linear-gradient(180deg, rgba(23,29,37,.98), rgba(18,24,32,.96)) !important;
        border-radius: 20px !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.03), var(--fg-shadow-modal) !important;
        border: 1px solid var(--fg-border) !important;
    }
    .fin-cc-shell .modal-header,
    .fin-cc-shell .modal-footer { border-color: var(--fg-border) !important; }
    .fin-cc-shell .form-control,
    .fin-cc-shell .form-select { min-height: 44px; }
    .fin-cc-shell .table tbody tr:hover { background: rgba(255,255,255,.03) !important; }
</style>
<div class="fin-cc-shell">
    <div class="d-flex justify-content-between align-items-center fin-cc-hero">
        <h2><i class="fas fa-tags me-2 text-primary"></i>Centros de Custo</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newCostCenterModal">
            <i class="fas fa-plus me-2"></i>Novo Centro de Custo
        </button>
    </div>

    <div class="card fin-cc-table-card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Identificação</th>
                            <th>Cor/Ícone</th>
                            <th>Status</th>
                            <th class="text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="costCentersTable">
                        <tr>
                            <td colspan="4" class="text-center text-muted">Carregando categorias...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="newCostCenterModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-bottom border-secondary">
                    <h5 class="modal-title">Novo Centro de Custo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formCostCenter">
                        <input type="hidden" id="ccId">
                        <div class="mb-3">
                            <label class="form-label">Nome da Categoria</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="ccNome" required placeholder="Ex: Marketing Digital">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Cor Hexadecimal</label>
                                <input type="color" class="form-control form-control-color bg-dark border-secondary w-100" id="ccCor" value="#6366f1" title="Escolha a cor do relatório">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Ícone do Categoria</label>
                                <input type="hidden" id="ccIcone" value="fas fa-tags">
                                <div class="d-flex align-items-center bg-dark border border-secondary rounded p-2" style="overflow-x: auto; white-space: nowrap; max-width: 100%; gap: 10px;" id="iconSelectorContainer">
                                    <button type="button" class="btn btn-outline-secondary icon-btn active" data-icon="fas fa-tags"><i class="fas fa-tags"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-home"><i class="fas fa-home"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-car"><i class="fas fa-car"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-plane"><i class="fas fa-plane"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-utensils"><i class="fas fa-utensils"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-shopping-cart"><i class="fas fa-shopping-cart"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-laptop"><i class="fas fa-laptop"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-building"><i class="fas fa-building"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-graduation-cap"><i class="fas fa-graduation-cap"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-heartbeat"><i class="fas fa-heartbeat"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-bolt"><i class="fas fa-bolt"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-tools"><i class="fas fa-tools"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-chart-line"><i class="fas fa-chart-line"></i></button>
                                    <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-box"><i class="fas fa-box"></i></button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveCostCenter()">Salvar</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', loadCostCenters);

    function loadCostCenters() {
        fetch('/api/financeiro/cost-centers')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('costCentersTable');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum centro de custo cadastrado.</td></tr>';
                    return;
                }

                data.forEach(cc => {
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <i class="${cc.icone} me-2" style="color: ${cc.cor}"></i>
                                <strong>${cc.nome}</strong>
                            </td>
                            <td><span class="badge" style="background-color: ${cc.cor}">${cc.cor}</span></td>
                            <td><span class="badge bg-success">Ativo</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-outline-info me-1" onclick="editCostCenter(${cc.id}, '${cc.nome}', '${cc.cor}', '${cc.icone}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteCostCenter(${cc.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function saveCostCenter() {
        const id = document.getElementById('ccId').value;
        const payload = {
            nome: document.getElementById('ccNome').value,
            cor: document.getElementById('ccCor').value,
            icone: document.getElementById('ccIcone').value
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/financeiro/cost-centers/${id}` : '/api/financeiro/cost-centers';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            if (res.success) {
                bootstrap.Modal.getInstance(document.getElementById('newCostCenterModal')).hide();
                loadCostCenters();
                document.getElementById('formCostCenter').reset();
                document.getElementById('ccId').value = '';
            } else {
                alert(res.message);
            }
        });
    }

    function editCostCenter(id, nome, cor, icone) {
        document.getElementById('ccId').value = id;
        document.getElementById('ccNome').value = nome;
        document.getElementById('ccCor').value = cor;
        document.getElementById('ccIcone').value = icone;
        document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
        let found = false;
        document.querySelectorAll('.icon-btn').forEach(b => {
            if (b.getAttribute('data-icon') === icone) {
                b.classList.add('active');
                found = true;
            }
        });
        if (!found) {
            document.querySelector('.icon-btn[data-icon="fas fa-tags"]').classList.add('active');
        }
        new bootstrap.Modal(document.getElementById('newCostCenterModal')).show();
    }

    function deleteCostCenter(id) {
        if (confirm('Deseja inativar este Centro de Custo? Lançamentos antigos não serão apagados.')) {
            fetch(`/api/financeiro/cost-centers/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) loadCostCenters();
                });
        }
    }

    document.getElementById('newCostCenterModal').addEventListener('hidden.bs.modal', function () {
        document.getElementById('formCostCenter').reset();
        document.getElementById('ccId').value = '';
        document.getElementById('ccIcone').value = 'fas fa-tags';
        document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.icon-btn[data-icon="fas fa-tags"]').classList.add('active');
    });

    document.querySelectorAll('.icon-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('ccIcone').value = this.getAttribute('data-icon');
        });
    });
</script>
{% endblock %}
