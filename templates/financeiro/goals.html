{% extends 'base.html' %}
{% block title %}Metas de Caixa - Financeiro PJ{% endblock %}

{% block content %}
<style>
    .fin-goals-shell { display: grid; gap: 1.25rem; }
    .fin-goals-hero,
    .fin-goals-grid-shell {
        border: 1px solid var(--fg-border) !important;
        border-radius: 20px !important;
        background: linear-gradient(180deg, rgba(23,29,37,.96), rgba(18,24,32,.92)) !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.03), var(--fg-shadow-card);
    }
    .fin-goals-hero { padding: 1.2rem 1.35rem; }
    .fin-goals-shell .modal-content {
        background: linear-gradient(180deg, rgba(23,29,37,.98), rgba(18,24,32,.96)) !important;
        border-radius: 20px !important;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.03), var(--fg-shadow-modal) !important;
        border: 1px solid var(--fg-border) !important;
    }
    .fin-goals-shell .modal-header,
    .fin-goals-shell .modal-footer { border-color: var(--fg-border) !important; }
    .fin-goals-shell .form-control,
    .fin-goals-shell .form-select { min-height: 44px; }
</style>
<div class="fin-goals-shell">
    <div class="d-flex justify-content-between align-items-center fin-goals-hero">
        <h2><i class="fas fa-bullseye me-2 text-primary"></i>Metas Financeiras e Provisão</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newGoalModal">
            <i class="fas fa-plus me-2"></i>Nova Meta
        </button>
    </div>

    <div class="card fin-goals-grid-shell">
        <div class="card-body">
            <div class="row mt-1" id="goalsGrid">
                <div class="col-12 text-center text-muted">
                    <h5>Aguarde, carregando metas...</h5>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="newGoalModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-bottom border-secondary">
                    <h5 class="modal-title">Configurar Nova Meta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formGoal">
                        <input type="hidden" id="goalId" value="">
                        <div class="mb-3">
                            <label class="form-label">Descrição da Meta</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="goalNome" required placeholder="Ex: Fundo de Emergência 6 Meses">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Valor Alvo (R$)</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary money-mask" id="goalAlvo" required value="R$ 0,00" onkeyup="mascaraMoeda(this, event)">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Cor Hexadecimal</label>
                                <input type="color" class="form-control form-control-color bg-dark border-secondary w-100" id="goalCor" value="#10b981" title="Cor principal da meta">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Já Alcançado (R$)</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary money-mask" id="goalAtual" value="R$ 0,00" onkeyup="mascaraMoeda(this, event)">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Prazo Ideal (Opcional)</label>
                            <input type="date" class="form-control bg-dark text-white border-secondary" id="goalPrazo">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ícone da Meta</label>
                            <input type="hidden" id="goalIcone" value="fas fa-bullseye">
                            <div class="d-flex align-items-center bg-dark border border-secondary rounded p-2" style="overflow-x: auto; white-space: nowrap; max-width: 100%; gap: 10px;" id="iconSelectorContainer">
                                <button type="button" class="btn btn-outline-secondary icon-btn active" data-icon="fas fa-bullseye"><i class="fas fa-bullseye"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-piggy-bank"><i class="fas fa-piggy-bank"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-chart-line"><i class="fas fa-chart-line"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-home"><i class="fas fa-home"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-car"><i class="fas fa-car"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-rocket"><i class="fas fa-rocket"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-gem"><i class="fas fa-gem"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-shield-alt"><i class="fas fa-shield-alt"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-hand-holding-usd"><i class="fas fa-hand-holding-usd"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-gift"><i class="fas fa-gift"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-money-bill-wave"><i class="fas fa-money-bill-wave"></i></button>
                                <button type="button" class="btn btn-outline-secondary icon-btn" data-icon="fas fa-trophy"><i class="fas fa-trophy"></i></button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveGoal()">Salvar Meta</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    String.prototype.reverse = function () {
        return this.split('').reverse().join('');
    };

    function mascaraMoeda(campo, evento) {
        var tecla = (!evento) ? window.event.keyCode : evento.which;
        var valor = campo.value.replace(/[^\d]+/gi, '').reverse();
        var resultado = '';
        var mascara = '##.###.###,##'.reverse();
        for (var x = 0, y = 0; x < mascara.length && y < valor.length;) {
            if (mascara.charAt(x) != '#') {
                resultado += mascara.charAt(x);
                x++;
            } else {
                resultado += valor.charAt(y);
                y++;
                x++;
            }
        }
        campo.value = 'R$ ' + resultado.reverse();
    }

    function limparMoeda(valorFormatado) {
        if (!valorFormatado) return 0.0;
        var limpo = valorFormatado.replace('R$ ', '').replace(/\./g, '').replace(',', '.');
        return parseFloat(limpo) || 0;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadGoals();
        document.getElementById('newGoalModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('formGoal').reset();
            document.getElementById('goalId').value = '';
            document.getElementById('goalAlvo').value = 'R$ 0,00';
            document.getElementById('goalAtual').value = 'R$ 0,00';
        });
    });

    const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

    function loadGoals() {
        const grid = document.getElementById('goalsGrid');

        fetch('/api/financeiro/goals')
            .then(res => res.json())
            .then(data => {
                grid.innerHTML = '';
                if (data.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-muted mt-5"><h5>Nenhuma meta configurada ainda.</h5><p>Estabeleça as metas financeiras da sua empresa (caixa alvo, PLR, etc).</p></div>';
                    return;
                }

                data.forEach(g => {
                    const pct = g.porcentagem.toFixed(1);
                    const prazoStr = g.prazo ? `Prazo: ${g.prazo.split('-').reverse().join('/')}` : 'Sem prazo';

                    grid.innerHTML += `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card bg-dark text-white border border-secondary h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-dark rounded-circle border border-secondary p-2 me-3" style="color: ${g.cor};">
                                            <i class="${g.icone} fa-lg"></i>
                                        </div>
                                        <div>
                                            <h5 class="card-title mb-0">${g.nome}</h5>
                                            <small class="text-muted">${prazoStr}</small>
                                        </div>
                                    </div>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteGoal(${g.id})" title="Apagar Meta"><i class="fas fa-trash"></i></button>
                                </div>
                                <div class="mt-4">
                                    <div class="d-flex justify-content-between small text-muted mb-1">
                                        <span>Progresso</span>
                                        <span class="fw-bold" style="color: ${g.cor};">${pct}%</span>
                                    </div>
                                    <div class="progress bg-black" style="height: 10px;">
                                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: ${pct}%; background-color: ${g.cor};" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-2 font-monospace" style="font-size: 0.85rem;">
                                        <span class="text-white">${formatter.format(g.valor_atual)}</span>
                                        <span class="text-muted">Alvo: ${formatter.format(g.valor_alvo)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            });
    }

    function saveGoal() {
        const payload = {
            nome: document.getElementById('goalNome').value,
            valor_alvo: limparMoeda(document.getElementById('goalAlvo').value),
            valor_atual: limparMoeda(document.getElementById('goalAtual').value),
            prazo: document.getElementById('goalPrazo').value,
            cor: document.getElementById('goalCor').value,
            icone: document.getElementById('goalIcone').value
        };

        const goalId = document.getElementById('goalId').value;
        const url = goalId ? `/api/financeiro/goals/${goalId}` : '/api/financeiro/goals';
        const method = goalId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            if (res.success) {
                bootstrap.Modal.getInstance(document.getElementById('newGoalModal')).hide();
                loadGoals();
                document.getElementById('formGoal').reset();
                document.getElementById('goalId').value = '';
            } else {
                alert(res.message);
            }
        });
    }

    function deleteGoal(id) {
        if (confirm('Deseja apagar esta Meta/Provisão?')) {
            fetch(`/api/financeiro/goals/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) loadGoals();
                });
        }
    }

    document.querySelectorAll('.icon-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('goalIcone').value = this.getAttribute('data-icon');
        });
    });
</script>
{% endblock %}
