{% extends 'base.html' %}
{% block title %}Metas de Caixa - Financeiro PJ{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-bullseye me-2 text-primary"></i>Metas Financeiras e Provisão</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newGoalModal">
        <i class="fas fa-plus me-2"></i>Nova Meta
    </button>
</div>

<div class="row mt-4" id="goalsGrid">
    <div class="col-12 text-center text-muted">
        <h5>Aguarde, carregando metas...</h5>
    </div>
</div>

<!-- Modal Nova Meta -->
<div class="modal fade" id="newGoalModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title">Configurar Nova Meta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formGoal">
                    <div class="mb-3">
                        <label class="form-label">Descrição da Meta</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="goalNome"
                            required placeholder="Ex: Fundo de Emergência 6 Meses">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Valor Alvo (R$)</label>
                            <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary"
                                id="goalAlvo" required placeholder="100000.00">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Já Alcançado (R$)</label>
                            <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary"
                                id="goalAtual" value="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prazo Ideal (Opcional)</label>
                        <input type="date" class="form-control bg-dark text-white border-secondary" id="goalPrazo">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="saveGoal()">Salvar Meta</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', loadGoals);

    const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

    function loadGoals() {
        const grid = document.getElementById('goalsGrid');

        fetch('/api/financeiro/goals')
            .then(res => res.json())
            .then(data => {
                grid.innerHTML = '';
                if (data.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-muted mt-5"><h5>Nenhuma meta configurada ainda.</h5><p>Estabeleça as metas financeiras da sua empresa (caixa alvo, PLR, etc).</p></div>';
                    return;
                }

                data.forEach(g => {
                    const pct = g.porcentagem.toFixed(1);
                    const prazoStr = g.prazo ? `Prazo: ${g.prazo.split('-').reverse().join('/')}` : 'Sem prazo';

                    grid.innerHTML += `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card bg-dark text-white border border-secondary h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-dark rounded-circle border border-secondary p-2 me-3" style="color: ${g.cor};">
                                            <i class="${g.icone} fa-lg"></i>
                                        </div>
                                        <div>
                                            <h5 class="card-title mb-0">${g.nome}</h5>
                                            <small class="text-muted">${prazoStr}</small>
                                        </div>
                                    </div>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteGoal(${g.id})" title="Apagar Meta"><i class="fas fa-trash"></i></button>
                                </div>
                                
                                <div class="mt-4">
                                    <div class="d-flex justify-content-between small text-muted mb-1">
                                        <span>Progresso</span>
                                        <span class="fw-bold" style="color: ${g.cor};">${pct}%</span>
                                    </div>
                                    <div class="progress bg-black" style="height: 10px;">
                                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: ${pct}%; background-color: ${g.cor};" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-2 font-monospace" style="font-size: 0.85rem;">
                                        <span class="text-white">${formatter.format(g.valor_atual)}</span>
                                        <span class="text-muted">Alvo: ${formatter.format(g.valor_alvo)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            });
    }

    function saveGoal() {
        const payload = {
            nome: document.getElementById('goalNome').value,
            valor_alvo: document.getElementById('goalAlvo').value,
            valor_atual: document.getElementById('goalAtual').value,
            prazo: document.getElementById('goalPrazo').value
        };

        fetch('/api/financeiro/goals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            if (res.success) {
                bootstrap.Modal.getInstance(document.getElementById('newGoalModal')).hide();
                loadGoals();
                document.getElementById('formGoal').reset();
            } else {
                alert(res.message);
            }
        });
    }

    function deleteGoal(id) {
        if (confirm('Apagar esta meta do painel?')) {
            fetch(`/api/financeiro/goals/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) loadGoals();
                });
        }
    }
</script>
{% endblock %}
