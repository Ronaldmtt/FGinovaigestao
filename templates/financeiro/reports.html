{% extends 'base.html' %}
{% block title %}Relatórios - Financeiro PJ{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Relatórios Gerenciais</h2>
</div>

<div class="row g-4">
    <div class="col-md-6">
        <div class="card bg-dark text-white h-100">
            <div class="card-header border-bottom border-secondary">
                <h5 class="card-title mb-0">Despesas por Categoria (Mês Vigente)</h5>
            </div>
            <div class="card-body text-center d-flex justify-content-center align-items-center"
                style="min-height: 300px;">
                <canvas id="costCenterChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card bg-dark text-white h-100">
            <div class="card-header border-bottom border-secondary">
                <h5 class="card-title mb-0">Receitas X Despesas (Ano Base)</h5>
            </div>
            <div class="card-body text-center d-flex justify-content-center align-items-center"
                style="min-height: 300px;">
                <canvas id="trendsChart"></canvas>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<!-- Chart.js Injection para Reports Financeiros -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', loadCharts);

    function loadCharts() {
        fetch('/api/financeiro/relatorios-dados')
            .then(res => res.json())
            .then(data => {

                // Gráfico 1: Despesas por Cost Center (Rosca)
                const ctxDoughnut = document.getElementById('costCenterChart').getContext('2d');
                new Chart(ctxDoughnut, {
                    type: 'doughnut',
                    data: {
                        labels: data.cost_centers.labels,
                        datasets: [{
                            data: data.cost_centers.data,
                            backgroundColor: data.cost_centers.colors,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#fff' }
                            }
                        }
                    }
                });

                // Gráfico 2: Evolução de Receitas x Despesas (Linhas)
                const ctxLine = document.getElementById('trendsChart').getContext('2d');
                new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: data.trends.labels,
                        datasets: [
                            {
                                label: 'Receitas',
                                data: data.trends.receitas,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: 'Despesas',
                                data: data.trends.despesas,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                ticks: { color: '#aaa' },
                                grid: { color: '#333' }
                            },
                            x: {
                                ticks: { color: '#aaa' },
                                grid: { color: '#333' }
                            }
                        },
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { color: '#fff' }
                            }
                        }
                    }
                });

            });
    }
</script>
{% endblock %}
