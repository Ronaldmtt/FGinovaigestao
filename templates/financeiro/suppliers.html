{% extends 'base.html' %}
{% block title %}Fornecedores - Financeiro PJ{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-truck-loading me-2 text-primary"></i>Fornecedores</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newSupplierModal">
        <i class="fas fa-plus me-2"></i>Novo Fornecedor
    </button>
</div>

<div class="card bg-dark text-white border-secondary shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th>Fornecedor</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="suppliersTable">
                    <tr>
                        <td colspan="4" class="text-center text-muted">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Novo Fornecedor -->
<div class="modal fade" id="newSupplierModal" tabindex="-1" aria-hidden="true" data-bs-theme="dark">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title">Configurar Fornecedor</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formSupplier">
                    <input type="hidden" id="supId" value="">
                    <div class="mb-3">
                        <label class="form-label">Nome Fantasia / Razão Social</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="supNome"
                            required placeholder="Ex: Fornecedor Ltda">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email (Opcional)</label>
                        <input type="email" class="form-control bg-dark text-white border-secondary" id="supEmail"
                            placeholder="contato@fornecedor.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefone (Opcional)</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="supTelefone"
                            placeholder="(11) 99999-9999">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="saveSupplier()">Salvar Fornecedor</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        loadSuppliers();
        document.getElementById('newSupplierModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('formSupplier').reset();
            document.getElementById('supId').value = '';
        });
    });

    function loadSuppliers() {
        const tbody = document.getElementById('suppliersTable');
        fetch('/api/financeiro/suppliers')
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum fornecedor cadastrado.</td></tr>';
                    return;
                }

                data.forEach(s => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${s.nome}</strong></td>
                            <td>${s.email || '-'}</td>
                            <td>${s.telefone || '-'}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-info me-1" onclick="editSupplier(${s.id}, '${s.nome.replace(/'/g, "\\'")}', '${s.email || ''}', '${s.telefone || ''}')" title="Editar Fornecedor"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteSupplier(${s.id})" title="Apagar Fornecedor"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function saveSupplier() {
        const payload = {
            nome: document.getElementById('supNome').value,
            email: document.getElementById('supEmail').value,
            telefone: document.getElementById('supTelefone').value
        };

        const supId = document.getElementById('supId').value;
        const url = supId ? `/api/financeiro/suppliers/${supId}` : '/api/financeiro/suppliers';
        const method = supId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            if (res.success) {
                bootstrap.Modal.getInstance(document.getElementById('newSupplierModal')).hide();
                loadSuppliers();
            } else {
                alert(res.message);
            }
        });
    }

    function editSupplier(id, nome, email, telefone) {
        document.getElementById('supId').value = id;
        document.getElementById('supNome').value = nome;
        document.getElementById('supEmail').value = email;
        document.getElementById('supTelefone').value = telefone;
        new bootstrap.Modal(document.getElementById('newSupplierModal')).show();
    }

    function deleteSupplier(id) {
        if (confirm('Tem certeza que deseja inativar este fornecedor?')) {
            fetch(`/api/financeiro/suppliers/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) loadSuppliers();
                });
        }
    }
</script>
{% endblock %}
